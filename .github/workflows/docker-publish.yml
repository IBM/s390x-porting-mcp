name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
      - "embedding-generation/**"
      - "s390x_kb_search/**"
      - "pyproject.toml"
  workflow_dispatch:

env:
  REGISTRY: quay.io/ibm/s390x-porting-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Quay_io_ibm_org_credentials

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push embeddings image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: embedding-generation/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}:embeddings-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push MCP server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}:latest
          build-args: |
            EMBEDDINGS_IMAGE=${{ env.REGISTRY }}:embeddings-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
